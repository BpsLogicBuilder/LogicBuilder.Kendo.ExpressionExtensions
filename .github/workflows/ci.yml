name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22.x"
  PROJECT_NAME: "LogicBuilder.Kendo.ExpressionExtensions"

jobs:
  test:
    name: Test
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add Telerik Nuget source
        run: dotnet nuget add source https://nuget.telerik.com/v3/index.json -n telerik -u ${{ env.TELERIK_USERNAME }} -p ${{ env.TELERIK_PASSWORD }}
        env:
          TELERIK_USERNAME: ${{ secrets.TELERIK_USERNAME }}
          TELERIK_PASSWORD: ${{ secrets.TELERIK_PASSWORD }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Install SonarQube Cloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube Cloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: "${{ format('BpsLogicBuilder_{0}', env.PROJECT_NAME) }}"
          SONAR_ORGANIZATION_KEY: "bpslogicbuilder"
        run: |
          dotnet-sonarscanner begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_ORGANIZATION_KEY }}" /d:sonar.qualitygate.wait=true /d:sonar.token="${{ env.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="**/TestResults/coverage.opencover.xml"

      - name: Build project
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --verbosity normal --configuration Release /p:CollectCoverage=true /p:Threshold=50 /p:ThresholdType=line /p:ThresholdStat=Average /p:CoverletOutput=./TestResults/ /p:ExcludeByAttribute="GeneratedCodeAttribute" /p:CoverletOutputFormat=opencover

      - name: End SonarQube Cloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-packages:
    name: Publish to GitHub Packages
    runs-on: windows-latest
    if: github.repository_owner == 'BpsLogicBuilder'
    permissions:
      contents: read
      packages: write
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          source-url: https://nuget.pkg.github.com/bpsLogicBuilder/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Telerik Nuget source
        run: dotnet nuget add source https://nuget.telerik.com/v3/index.json -n telerik -u ${{ env.TELERIK_USERNAME }} -p ${{ env.TELERIK_PASSWORD }}
        env:
          TELERIK_USERNAME: ${{ secrets.TELERIK_USERNAME }}
          TELERIK_PASSWORD: ${{ secrets.TELERIK_PASSWORD }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore --configuration Release

      - name: Publish to GitHub Packages
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} --configuration Release -o .\nupkg --no-build
          dotnet nuget push ${{ env.NUGET_PACKAGE_PATH }} --skip-duplicate --api-key ${{ env.GITHUB_TOKEN }}
        env:
          NUGET_PACKAGE_PATH: "${{ format('.\\nupkg\\{0}.*.nupkg', env.PROJECT_NAME) }}"
          PROJECT_PATH: "${{ format('.\\{0}\\{0}.csproj', env.PROJECT_NAME) }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}